services:
  test-db:
    image: postgres:17
    container_name: persist-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: persist_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data # ephemeral — wiped on container stop, faster too